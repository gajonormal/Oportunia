<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Password - Oportunia</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --background: 210 25% 97%;
            --foreground: 210 40% 12%;
            --primary: 203 42% 35%;
            --font-heading: 'Plus Jakarta Sans', sans-serif;
            --font-body: 'Inter', sans-serif;
            --gradient-primary: linear-gradient(135deg, hsl(203 42% 35%), hsl(205 45% 58%));
            --shadow-card: 0 1px 3px hsl(203 42% 35% / 0.06), 0 4px 12px hsl(203 42% 35% / 0.04);
        }

        body {
            font-family: var(--font-body);
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
        }

        h1, h2, h3 {
            font-family: var(--font-heading);
        }

        .gradient-primary {
            background: var(--gradient-primary);
        }

        .card-elevated {
            background: white;
            box-shadow: var(--shadow-card);
            border: 1px solid hsl(210 20% 88%);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-sm">
        <div class="text-center mb-8 flex flex-col items-center gap-3">
            <a href="/" class="inline-flex flex-col items-center gap-3 hover:opacity-90 transition-opacity">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Oportunia" class="w-14 h-14">
                <span class="text-2xl font-bold" style="font-family: var(--font-heading);">Oportunia</span>
            </a>
            <p class="text-sm opacity-60 mt-2">Cria uma nova palavra-passe</p>
        </div>

        <div class="card-elevated rounded-xl p-6">
            {% if erro %}
            <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm flex items-center gap-2">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                {{ erro }}
            </div>
            {% endif %}

            {% if sucesso %}
            <div class="mb-4 px-4 py-3 rounded-lg bg-green-50 border border-green-200 text-green-700 text-sm flex items-center gap-2">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
                {{ sucesso }}
            </div>
            <div class="mt-4 text-center">
                <a href="/login" class="w-full inline-block gradient-primary text-white font-semibold h-10 leading-10 rounded-lg shadow-sm hover:opacity-90 transition-all text-sm">
                    Ir para o Login
                </a>
            </div>
            {% else %}
            <form action="{{ url_for('reset_password_post', token=token) }}" method="POST" class="space-y-4">
                <div class="space-y-2">
                    <label for="password" class="text-xs font-semibold">Nova Password</label>
                    <div class="relative">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                        <input id="password" type="password" name="password" placeholder="••••••••" required minlength="8"
                            class="w-full pl-10 pr-3 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[hsl(var(--primary))] focus:bg-white transition-colors text-sm">
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="confirm_password" class="text-xs font-semibold">Confirmar Nova Password</label>
                    <div class="relative">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                        <input id="confirm_password" type="password" name="confirm_password" placeholder="••••••••" required minlength="8"
                            class="w-full pl-10 pr-3 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[hsl(var(--primary))] focus:bg-white transition-colors text-sm">
                    </div>
                </div>

                <button type="submit" class="w-full gradient-primary text-white font-semibold h-10 rounded-lg shadow-sm hover:opacity-90 transition-all text-sm mt-4">
                    Guardar Password
                </button>
            </form>
            {% endif %}
        </div>
    </div>
</body>
</html>
