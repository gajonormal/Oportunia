<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Oportunia</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --background: 210 25% 97%;
            --foreground: 210 40% 12%;
            --primary: 203 42% 35%;
            --font-heading: 'Plus Jakarta Sans', sans-serif;
            --font-body: 'Inter', sans-serif;
            --gradient-primary: linear-gradient(135deg, hsl(203 42% 35%), hsl(205 45% 58%));
        }

        body {
            font-family: var(--font-body);
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
        }

        h1,
        h2,
        h3 {
            font-family: var(--font-heading);
        }

        .gradient-text {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Animação de entrada suave */
        .fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-sm fade-in-up">

        <div class="text-center mb-8">
            <a href="/" class="inline-flex flex-col items-center gap-3 hover:opacity-90 transition-opacity">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Oportunia" class="w-14 h-14">
                <span class="text-2xl font-bold" style="font-family: var(--font-heading);">Oportunia</span>
            </a>
            <p class="text-sm text-slate-500 mt-2">Cria a tua conta para começar</p>
        </div>

        <div class="bg-white border border-slate-200 shadow-xl rounded-xl p-6">

            <form action="/perfil" method="GET" class="space-y-5">

                <div class="space-y-1.5">
                    <label for="name" class="text-xs font-semibold text-slate-700">Nome completo</label>
                    <div class="relative">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                        <input id="name" type="text" placeholder="Ex: Bernardo Maia" required
                            class="w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[hsl(var(--primary))] bg-slate-50 focus:bg-white transition-colors">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label for="email" class="text-xs font-semibold text-slate-700">Email</label>
                    <div class="relative">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                            </path>
                        </svg>
                        <input id="email" type="email" placeholder="bernardo@ipcb.pt" required
                            class="w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[hsl(var(--primary))] bg-slate-50 focus:bg-white transition-colors">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label for="password" class="text-xs font-semibold text-slate-700">Password</label>
                    <div class="relative">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                            </path>
                        </svg>
                        <input id="password" type="password" placeholder="Mínimo 8 caracteres" minlength="8" required
                            class="w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[hsl(var(--primary))] bg-slate-50 focus:bg-white transition-colors">
                    </div>
                </div>

                <button type="submit" style="background: var(--gradient-primary);"
                    class="w-full flex items-center justify-center gap-2 py-2.5 rounded-lg text-sm font-semibold text-white shadow-md hover:opacity-90 transition-opacity">
                    Criar Conta
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-slate-500">
                Já tens conta?
                <a href="/login" class="font-semibold hover:underline" style="color: hsl(var(--primary));">
                    Entrar
                </a>
            </div>

        </div>
    </div>

</body>

</html>
